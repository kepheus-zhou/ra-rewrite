name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  release:
    types: [ created ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run RA core unit test
        run: make test

  static-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config curl
      - name: Build static dependencies
        run: sh scripts/build-deps.sh
      - name: Build static binary
        run: make static
      - name: Show linkage (deps static, glibc dynamic)
        run: |
          file ra-rewrite
          ldd ra-rewrite || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ra-rewrite-static
          path: ra-rewrite
      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ra-rewrite
